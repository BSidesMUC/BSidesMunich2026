Marius:
  handle: ""
  bio: "Marius worked for 5 years at the German Patent and Trademark Office on the electronic patent and trademark filing systems. Since 2025, he has been working at the University of Applied Sciences Munich as a researcher and PhD student investigating the resiliency of operational technology at the HM-SecLab. Since his master's degree in 2023, he has been working on SBOMs and is a regular contributor to SBOM projects. Mostly, he can be found with the SBOM-Everywhere Working Group at the OpenSSF. He is one of the maintainers and developers of the SBOM-Tooling Catalog hosted by the OpenSSF."

Morton:
  handle:
  bio: "Morton has been a pioneer in anti-virus and IDS research since it’s inception in the late 1980’s. After working on various anti-virus engines, from his own, through S&S International’s (now McAfee) to IBM, he moved on to designing novel security models in the IoT and compliance space. More recently, he has been working at Trend Micro in Threat Research."

Radoslav:
  handle:
  bio: "Radoslav has passion about technologies, know-how sharing and promotion of best practices. With more than two decades in the IT sector, he has plenty of experience to share. For many years he has been supporting local tech communities. In his free time, he is writing articles, giving tech talks and organizing activities for children."

Silvio:
  handle:
  bio: "Silvio started his cybersecurity journey when IRC was still a thing but BBS boards weren’t anymore. Since that time he was a student, a systems engineer, a consultant, a researcher and currently is an enthusiastic collector of red-teamers tears as part of an awesome blue team. He likes to do non computer stuff as well - but that’s a story for a different day."

Sneha:
  handle: "@Sneharajguru"
  bio: "Sneha has been working in the field of information security for over a decade now, she has spoken and provided training at various international security conferences. Outside work, she likes to take small hikes in the alps, spends her time building the 75192 Millennium Falcon and is obsessed with Darth Vader."

