Dagmar:
  handle:
  bio: "Coming from a non-technical background, Dagmar brings her knowledge of event organization to BSidesMunich and - after moving up North again - to Elbsides, Hamburg’s Bsides event. Through previous experiences in professional stage management / production for theatre in the UK and US, as well as Sci-Fi conventions in Germany, she teamed up with her husband Morton to organize events for the computer security industry. Having lived and worked in a variety of countries, she enjoys traveling the globe and seeing theatre productions, especially in London."

Eduardo:
  handle:
  bio: "Eduardo was born in Guatemala and has been part of the organizing team for the past few years, after starting out as a volunteer. Based in Munich, he works on keeping complex systems secure and running smoothly. Outside of that, he enjoys bouldering, snowboarding, and most recently, the wild adventure of being a new dad."

Ingmar:
  handle:
  bio: "Originally from the hilly Sauerland Ingmar was drawn by the big mountains (and of a job offer) to munich almost 15 years ago. After starting in systems and network administration Ingmar fell into the rabbit hole of security and annoyed clients with his findings as a penetration test and red teamer. His spare time his spent around the alps, on motorcycles, bikes or on foot."

